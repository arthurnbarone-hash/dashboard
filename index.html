  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg: #090a13;
      --card-bg: #111324;
      --card-hover: #181a30;
      --text: #f4f6fc;
      --text-muted: #9ea0b0;
      --border: #1e2040;
      --linkedin: #0a66c2;
      --instagram: #e1306c;
      --tiktok: #25f4ee;
      --youtube: #ff0000;
      --overview: #0050ff;
      --goals: #0050ff;
      --newsletter: #0a66c2;
      --newsletter-card: #f59e0b;
    }

    body {
      font-family: 'Cairo', 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .hidden {
      display: none !important;
    }

    /* Header */
    header {
      background: linear-gradient(135deg, #111324 0%, #090a13 100%);
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header h1 {
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(135deg, #0050ff, #4d7cff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    header .back-btn {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: 20px;
      cursor: pointer;
      padding: 8px;
      display: none;
    }

    header .back-btn:hover {
      color: var(--text);
    }

    /* Home Grid */
    .page {
      padding: 32px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .home-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      margin-top: 24px;
    }

    .home-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 28px 20px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
      overflow: hidden;
    }

    .home-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
      background: var(--card-hover);
    }

    .home-card .icon {
      font-size: 40px;
      margin-bottom: 12px;
    }

    .home-card .name {
      font-size: 14px;
      font-weight: 600;
      color: var(--text-muted);
    }

    .home-card .handle {
      font-size: 12px;
      color: var(--text-muted);
      opacity: 0.6;
      margin-top: 4px;
    }

    .home-card .stat {
      font-size: 22px;
      font-weight: 700;
      margin-top: 8px;
    }

    .home-card .stat-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .home-card::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      border-radius: 16px 16px 0 0;
    }

    .home-card.linkedin::after {
      background: var(--linkedin);
    }

    .home-card.instagram::after {
      background: var(--instagram);
    }

    .home-card.tiktok::after {
      background: var(--tiktok);
    }

    .home-card.youtube::after {
      background: var(--youtube);
    }

    .home-card.overview::after {
      background: var(--overview);
    }

    .home-card.goals::after {
      background: var(--goals);
    }

    .home-card.newsletter::after {
      background: var(--newsletter-card);
    }

    .home-card.linkedin .icon {
      color: var(--linkedin);
    }

    .home-card.instagram .icon {
      color: var(--instagram);
    }

    .home-card.tiktok .icon {
      color: var(--tiktok);
    }

    .home-card.youtube .icon {
      color: var(--youtube);
    }

    .home-card.overview .icon {
      color: var(--overview);
    }

    .home-card.goals .icon {
      color: var(--goals);
    }

    .home-card.newsletter .icon {
      color: var(--newsletter-card);
    }

    /* Stats Cards */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 16px;
      margin: 24px 0;
    }

    .stat-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }

    .stat-card .stat-value {
      font-size: 28px;
      font-weight: 700;
      margin-top: 4px;
    }

    .stat-card .stat-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .stat-card .stat-change {
      font-size: 13px;
      margin-top: 4px;
    }

    .stat-card .stat-change.pos {
      color: #4caf50;
    }

    .stat-card .stat-change.neg {
      color: #f44336;
    }

    /* Charts */
    .charts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
      gap: 20px;
      margin: 24px 0;
    }

    .chart-box {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
    }

    .chart-box h3 {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 16px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .chart-box canvas {
      max-height: 300px;
    }

    /* Table */
    .table-wrap {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin: 24px 0;
      overflow-x: auto;
    }

    .table-wrap h3 {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    th,
    td {
      padding: 10px 12px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    th {
      color: var(--text-muted);
      font-weight: 600;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    tr:hover td {
      background: rgba(255, 255, 255, 0.03);
    }

    td.pos {
      color: #4caf50;
    }

    td.neg {
      color: #f44336;
    }

    /* Section title */
    .section-title {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .section-subtitle {
      font-size: 14px;
      color: var(--text-muted);
    }

    .page-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 8px;
    }

    .page-header .icon-lg {
      font-size: 36px;
    }

    /* Metas */
    .metas-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-top: 24px;
    }

    @media (max-width: 768px) {
      .metas-grid {
        grid-template-columns: 1fr;
      }
    }

    .meta-form-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 24px;
    }

    .meta-form-card h3 {
      font-size: 16px;
      margin-bottom: 16px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .form-group input,
    .form-group select {
      width: 100%;
      padding: 10px 14px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      outline: none;
      transition: border 0.2s;
    }

    .form-group input:focus,
    .form-group select:focus {
      border-color: var(--overview);
      box-shadow: 0 0 0 2px rgba(0, 80, 255, 0.15);
    }

    .btn {
      padding: 10px 24px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      background: var(--overview);
      color: #ffffff;
    }

    .btn:hover {
      transform: translateY(-1px);
      filter: brightness(1.15);
    }

    .btn-danger {
      background: #f44336;
      color: white;
    }

    .btn-sm {
      padding: 6px 14px;
      font-size: 12px;
    }

    .btn-update {
      background: var(--goals);
      color: #ffffff;
    }

    .btn-update:hover {
      filter: brightness(1.15);
    }

    .meta-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .meta-card .meta-header {
      display: flex;
      justify-content: space-between;
      align-items: start;
      margin-bottom: 12px;
    }

    .meta-card .meta-platform {
      font-weight: 600;
      font-size: 15px;
    }

    .meta-card .meta-target {
      font-size: 13px;
      color: var(--text-muted);
    }

    .meta-card .meta-progress-text {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .progress-bar-bg {
      height: 8px;
      background: var(--bg);
      border-radius: 4px;
      margin-top: 8px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.8s ease;
    }

    .progress-bar-fill.green {
      background: linear-gradient(90deg, #4caf50, #8bc34a);
    }

    .progress-bar-fill.orange {
      background: linear-gradient(90deg, #ff9800, #ffc107);
    }

    .progress-bar-fill.red {
      background: linear-gradient(90deg, #f44336, #ff7043);
    }

    .progress-bar-fill.blue {
      background: linear-gradient(90deg, #0050ff, #4d7cff);
    }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
    }

    .empty-state .icon {
      font-size: 48px;
      margin-bottom: 12px;
      opacity: 0.5;
    }

    /* Overview page */
    .overview-platforms {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 16px;
      margin: 24px 0;
    }

    .platform-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 20px;
      cursor: pointer;
      transition: all 0.3s;
    }

    .platform-card:hover {
      transform: translateY(-2px);
      border-color: var(--text-muted);
    }

    .platform-card .p-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .platform-card .p-icon {
      font-size: 24px;
    }

    .platform-card .p-name {
      font-weight: 600;
    }

    .platform-card .p-handle {
      font-size: 12px;
      color: var(--text-muted);
    }

    .platform-card .p-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    .platform-card .p-stat {
      text-align: center;
    }

    .platform-card .p-stat .val {
      font-size: 18px;
      font-weight: 700;
    }

    .platform-card .p-stat .lbl {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
    }

    .tag.linkedin {
      background: rgba(10, 102, 194, 0.2);
      color: #5c9bd5;
    }

    .tag.instagram {
      background: rgba(225, 48, 108, 0.2);
      color: #f06292;
    }

    .tag.tiktok {
      background: rgba(37, 244, 238, 0.2);
      color: #4dd0e1;
    }

    .tag.youtube {
      background: rgba(255, 0, 0, 0.2);
      color: #ef5350;
    }

    /* Responsive */
    @media (max-width: 600px) {
      .page {
        padding: 16px;
      }

      .home-grid {
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 12px;
      }

      .charts-grid {
        grid-template-columns: 1fr;
      }
    }

    /* Loading */
    .loading {
      text-align: center;
      padding: 60px;
      color: var(--text-muted);
    }

    .loading .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--overview);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 12px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* Filter chips */
    .filter-chip {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 10px;
      margin-bottom: 4px;
      border-radius: 6px;
      cursor: pointer;
      transition: all .25s ease;
      background: transparent;
      border: 1px solid transparent;
      user-select: none;
      opacity: .35;
    }

    .filter-chip:hover {
      opacity: .7;
      border-color: rgba(0, 80, 255, 0.2);
    }

    .filter-chip.active {
      opacity: 1;
      background: rgba(0, 80, 255, 0.12);
      border-color: var(--goals);
    }

    .filter-chip input[type=checkbox] {
      display: none;
    }

    .filter-chip .check-indicator {
      width: 18px;
      height: 18px;
      border-radius: 4px;
      border: 2px solid var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all .2s;
      flex-shrink: 0;
      font-size: 12px;
      font-weight: bold;
      color: transparent;
    }

    .filter-chip.active .check-indicator {
      background: var(--goals);
      border-color: var(--goals);
      color: #fff;
    }

    /* Period Dropdown */
    .period-dropdown {
      position: relative;
      display: inline-block;
      min-width: 240px;
      margin-bottom: 20px;
    }

    .period-dropdown-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      transition: all .2s;
      user-select: none;
    }

    .period-dropdown-header:hover {
      border-color: var(--overview);
    }

    .period-dropdown-header .dropdown-icon {
      font-size: 15px;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .period-dropdown-header .dropdown-label {
      flex: 1;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
    }

    .period-dropdown-header .dropdown-chevron {
      font-size: 12px;
      color: var(--text-muted);
      flex-shrink: 0;
      transition: transform .3s ease;
    }

    .period-dropdown-header.open .dropdown-chevron {
      transform: rotate(180deg);
    }

    .period-dropdown-menu {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      padding: 8px;
      z-index: 50;
      display: none;
      max-height: 320px;
      overflow-y: auto;
    }

    .period-dropdown-menu.open {
      display: block;
    }

    .period-dropdown-option {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: 8px;
      cursor: pointer;
      transition: all .15s;
      user-select: none;
    }

    .period-dropdown-option:hover {
      background: rgba(0, 80, 255, 0.08);
    }

    .period-dropdown-option .option-check {
      width: 20px;
      height: 20px;
      border-radius: 5px;
      border: 2px solid var(--text-muted);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: all .2s;
      font-size: 11px;
      color: transparent;
    }

    .period-dropdown-option.active .option-check {
      background: var(--goals);
      border-color: var(--goals);
      color: #fff;
    }

    .period-dropdown-option .option-label {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
    }

    .period-dropdown-option.todos {
      border-bottom: 1px solid var(--border);
      margin-bottom: 4px;
      padding-bottom: 12px;
    }

    .period-dropdown-option.todos .option-label {
      font-weight: 700;
    }

    .period-dropdown-footer {
      border-top: 1px solid var(--border);
      margin-top: 4px;
      padding-top: 8px;
    }

    .period-dropdown-apply {
      width: 100%;
      padding: 8px 12px;
      border: none;
      border-radius: 8px;
      background: var(--goals);
      color: #fff;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
      font-family: inherit;
    }

    .period-dropdown-apply:hover {
      filter: brightness(1.15);
    }

    /* Metric groups (LinkedIn) */
    .metric-group {
      margin-bottom: 28px;
    }

    .metric-group:last-child {
      margin-bottom: 0;
    }

    .metric-group-title {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .metric-group-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Section headings */
    .section-heading {
      display: flex;
      align-items: center;
      gap: 16px;
      margin: 36px 0 20px;
    }

    .section-heading:first-child {
      margin-top: 0;
    }

    .section-heading-label {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 2px;
      white-space: nowrap;
    }

    .section-heading-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Bento Grid Charts */
    .bento-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
      margin-top: 24px;
    }

    .bento-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 24px;
      display: flex;
      flex-direction: column;
    }

    .bento-card-title {
      margin-bottom: 16px;
    }

    .bento-card-title-left {
      font-size: 11px;
      font-weight: 700;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .bento-bar-card {
      background: linear-gradient(135deg, #0a66c2, #084c8f);
    }

    .bento-bar-newsletter {
      background: linear-gradient(135deg, #0a66c2, #084c8f) !important;
    }

    .bento-bar-newsletter .bento-card-title-left {
      color: rgba(255, 255, 255, .8);
    }

    .bento-bar-card .bento-card-title-left {
      color: rgba(255, 255, 255, .8);
    }

    /* Chart hover effects - Seguidores (dots) */
    .chart-dot-group { transition: opacity 0.25s; }
    .chart-dot { cursor:pointer; transition: r 0.15s, stroke-width 0.15s; }
    .chart-dot:hover { stroke-width: 3; }
    .chart-val { opacity: 0; transition: opacity 0.25s; pointer-events: none; }
    .bento-card:not(.bento-bar-card) svg:hover .chart-dot-group { opacity: 0.3; }
    .bento-card:not(.bento-bar-card) svg .chart-dot-group:hover { opacity: 1; }
    .bento-card:not(.bento-bar-card) svg .chart-dot-group:hover .chart-val { opacity: 1; }

    /* Chart hover effects - Impressões (bars) */
    .chart-bar { cursor:pointer; transition: opacity 0.25s, filter 0.25s; }
    .chart-bar-label { opacity: 0; transition: opacity 0.25s; pointer-events: none; }
    .bento-bar-card svg:hover .chart-bar { opacity: 0.3; }
    .chart-bar:hover { opacity: 1 !important; filter: brightness(1.25); }

    function excelDate(serial) {
      if (!serial || serial < 1) return "—";
      const d = new Date(Date.UTC(1899, 11, 30));
      d.setUTCDate(d.getUTCDate() + serial);
      return d.toLocaleDateString('pt-BR', { month: 'short', year: 'numeric', timeZone: 'UTC' }).replace(/\. /, '/').replace(/\.$/, '');
    }

    function monthLabel(serial) {
      if (!serial || serial < 1) return "—";
      const d = new Date(Date.UTC(1899, 11, 30));
      d.setUTCDate(d.getUTCDate() + serial);
      const months = ['JAN', 'FEV', 'MAR', 'ABR', 'MAI', 'JUN', 'JUL', 'AGO', 'SET', 'OUT', 'NOV', 'DEZ'];
      return months[d.getUTCMonth()] + '/' + d.getUTCFullYear().toString().slice(-2);
    }

    function fmt(n) { if (n == null || isNaN(n)) return "—"; return n.toLocaleString('pt-BR', { maximumFractionDigits: 1 }); }

    // ========== HELPER: MONTH OPTIONS ==========
    function getNetworkMonths(key) {
      const d = SHEET_DATA[key];
      if (!d) return [];
      return [...new Set(d.rows.map(r => r[0]))].filter(Boolean).sort((a, b) => a - b);
    }

    function getAllOverviewMonths() {
      const months = new Set();
      Object.keys(SHEET_DATA).forEach(key => {
        SHEET_DATA[key].rows.forEach(r => { if (r[0] && r[0] >= 45961 && r[0] <= 46204) months.add(r[0]); });
      });
      return [...months].sort((a, b) => a - b);
    }

    function isMonthSelected(serial) {
      if (_monthSelection === null) return true;
      return _monthSelection.includes(serial);
    }

    function toggleMonth(serial, key) {
      const allMonths = key ? getNetworkMonths(key) : getAllOverviewMonths();
      if (_monthSelection === null) {
        _monthSelection = allMonths.filter(s => s !== serial);
      } else {
        const idx = _monthSelection.indexOf(serial);
        if (idx >= 0) _monthSelection.splice(idx, 1);
        else _monthSelection.push(serial);
        if (_monthSelection.length === allMonths.length) _monthSelection = null;
      }
      if (key) renderNetwork(key); else renderOverview();
    }

    function selectAllMonths(key) {
      _monthSelection = null;
      if (key) renderNetwork(key); else renderOverview();
    }

    // ========== BENTO CHART HELPERS (SVG) ==========
    function bentoLineSVG(labels, data, color, uid) {
      var W=500,H=220,PT=28,PR=20,PB=38,PL=15;
      var CW=W-PL-PR,CH=H-PT-PB;
      var mx = Math.max.apply(null, data), mn = Math.min.apply(null, data), rng = mx - mn || 1;
      var pts = data.map(function (v, i) { return { x: PL + (i / (data.length - 1)) * CW, y: PT + CH - ((v - mn) / rng) * CH }; });
      var smooth = (function () {
        var s = 'M' + pts[0].x + ',' + pts[0].y;
        for (var i = 1; i < pts.length; i++) {
          var p0 = pts[Math.max(0, i - 2)], p1 = pts[i - 1], p2 = pts[i], p3 = pts[Math.min(pts.length - 1, i + 1)];
          s += 'C' + (p1.x + (p2.x - p0.x) / 6) + ',' + (p1.y + (p2.y - p0.y) / 6) + ' ' + (p2.x - (p3.x - p1.x) / 6) + ',' + (p2.y - (p3.y - p1.y) / 6) + ' ' + p2.x + ',' + p2.y;
        }
        return s;
      })();
      var bot = PT + CH, gradId = 'blg-' + uid;
          return '<svg viewBox="0 0 ' + W + ' ' + H + '" style="width:100%;display:block;flex:1;min-height:0;">' +
        '<defs><linearGradient id="' + gradId + '" x1="0" y1="0" x2="0" y2="1">' +
        '<stop offset="0" stop-color="' + color + '" stop-opacity=".25"/>' +
        '<stop offset="1" stop-color="' + color + '" stop-opacity="0"/>' +
        '</linearGradient></defs>' +
        '<path d="' + smooth + 'L' + pts[pts.length - 1].x + ',' + bot + 'L' + pts[0].x + ',' + bot + 'Z" fill="url(#' + gradId + ')"/>' +
        '<path d="' + smooth + '" fill="none" stroke="' + color + '" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>' +
        pts.map(function (p, i) {
          var val = data[i].toLocaleString('pt-BR');
          var growth = i > 0 ? data[i] - data[i - 1] : null;
          var growthStr = growth !== null ? (growth >= 0 ? '+' : '') + growth.toLocaleString('pt-BR') : '';
          return '<g class="chart-dot-group">' +
            '<circle class="chart-dot-hit" cx="' + p.x + '" cy="' + p.y + '" r="14" fill="transparent"/>' +
            '<circle class="chart-dot" cx="' + p.x + '" cy="' + p.y + '" r="4" fill="' + color + '" stroke="#fff" stroke-width="2"/>' +
            '<text class="chart-val" x="' + p.x + '" y="' + (p.y - 14) + '" text-anchor="middle" fill="' + color + '" font-size="11" font-weight="700" font-family="inherit">' + val + '</text>' +
            (growthStr ? '<text x="' + p.x + '" y="' + (p.y + 16) + '" text-anchor="middle" fill="' + (growth >= 0 ? '#4caf50' : '#f44336') + '" font-size="9" font-weight="600" font-family="inherit">' + growthStr + '</text>' : '') +
            '</g>';
        }).join('') +
        data.map(function (v, i) { return '<text x="' + pts[i].x + '" y="' + (H - 8) + '" text-anchor="middle" fill="#6b7280" font-size="10" font-family="inherit">' + (labels[i].split('/')[0].toUpperCase()) + '</text>'; }).join('') +
        '</svg>';
    }
    function bentoPillBarSVG(labels, data, barColor, uid) {
      var W = 500, H = 220, PT = 36, PR = 24, PB = 38, PL = 24;
      var CW = W - PL - PR, CH = H - PT - PB;
      var mx = Math.max.apply(null, data) || 1, n = data.length, gap = 8;
      var bw = Math.min((CW - gap * (n - 1)) / n, 48);
      var totalW = n * bw + (n - 1) * gap, startX = PL + (CW - totalW) / 2, r = Math.min(bw / 2, 12);
      return '<svg viewBox="0 0 ' + W + ' ' + H + '" style="width:100%;display:block;flex:1;min-height:0;">' +
        data.map(function (v, i) {
          var bh = Math.max((v / mx) * CH, 2), x = startX + i * (bw + gap), y = PT + CH - bh;
          return '<rect class="chart-bar" x="' + x + '" y="' + y + '" width="' + bw + '" height="' + bh + '" rx="' + r + '" ry="' + r + '" fill="' + barColor + '" opacity=".75"/>' +
            '<text class="chart-bar-label" x="' + (x + bw / 2) + '" y="' + (y - 10) + '" text-anchor="middle" fill="#fff" font-size="12" font-weight="700" font-family="inherit">' + v.toLocaleString('pt-BR') + '</text>' +
            '<text x="' + (x + bw / 2) + '" y="' + (H - 8) + '" text-anchor="middle" fill="rgba(255,255,255,.5)" font-size="10" font-family="inherit">' + (labels[i].split('/')[0].toUpperCase()) + '</text>';
        }).join('') +
        '</svg>';
    }
    function bentoGridChart(labels, data) {
      var total = data.reduce(function (a, b) { return a + b; }, 0) || 1;
      return '<div style="display:flex;gap:10px;align-items:stretch;flex:1;min-height:0;">' +
        data.map(function (v, i) {
          var pct = Math.max((v / total) * 100, 4), shortLabel = labels[i].split('/')[0].toUpperCase();
          return '<div class="bento-grid-box" style="flex:' + pct + ' 1 0;min-width:40px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px;gap:4px;">' +

            '<span style="font-size:13px;color:#e5e7eb;font-weight:700;line-height:1.2;text-align:center;word-break:break-word;">' + v.toLocaleString('pt-BR') + '</span>' +
            '</div>';
        }).join('') +
        '</div>';
    }

    // ========== GOALS (Firebase) ==========
    function getGoals() { return goalsCache; }

      goalsCache = g;
      db.ref('goals').set(g);
    }
    function loadGoalsFromFirebase() {
      return db.ref('goals').once('value').then(snap => {
        goalsCache = snap.val() || [];
      }).catch(() => { goalsCache = []; });

    db.ref('goals').on('value', snap => {

    function normalizeNetwork(name) {
      return NETWORK_MAP[name.toLowerCase()] || name;
    }

    function getNetworkFollowers(network, handle) {
      const net = normalizeNetwork(network);
      const key = Object.keys(SHEET_DATA).find(k =>
        SHEET_DATA[k].network === net &&
        SHEET_DATA[k].handle === handle
      );
      if (!key) return 0;
      return getLatestFollowers(key);
    }

    function getMetricCurrent(network, handle, type) {
      const net = normalizeNetwork(network);
      const key = Object.keys(SHEET_DATA).find(k =>
        SHEET_DATA[k].network === net &&
        SHEET_DATA[k].handle === handle
      );
      if (!key) return 0;
      const d = SHEET_DATA[key];
      if (!d || d.rows.length === 0) return 0;
      const last = d.rows[d.rows.length - 1];
      if (!last) return 0;
      if (type === 'visualizacoes') {
        return last[1] || 0;
      }
      return getLatestFollowers(key);
    }

      const anyAccsSelected = selectedAcc !== '';

      const selectedAccs = anyAccsSelected ? [selectedAcc] : [];
      const filtered = goals.filter(g => {
        if (!anyNetsSelected && !anyAccsSelected) return true;
        if (anyNetsSelected && g.network !== selectedNet) return false;
        if (anyAccsSelected && g.handle !== selectedAcc) return false;
        return true;
      });

    function addMeta(e) {
      e.preventDefault();
      const network = normalizeNetwork(document.getElementById('metaNetwork').value);
      const handle = document.getElementById('metaHandle').value;
      const type = document.getElementById('metaGoalType').value;
      const target = parseInt(document.getElementById('metaTarget').value);
      const current = parseInt(document.getElementById('metaCurrent').value) || 0;
      const deadline = document.getElementById('metaDeadline').value;
      const notes = document.getElementById('metaNotes').value;

      const goals = getGoals();
      goals.push({ network, handle, type, target, current, deadline, notes, createdAt: new Date().toISOString() });
      saveGoals(goals);
      document.body.style.overflow = '';
      renderGoals();
    }

    function saveFilterState() {
      const state = {
        selectedNet: document.getElementById('selectFilterNetwork') ? document.getElementById('selectFilterNetwork').value : '',
        selectedAcc: document.getElementById('selectFilterAccount') ? document.getElementById('selectFilterAccount').value : ''
      };
      localStorage.setItem('metaFilterState', JSON.stringify(state));
    }

    function updateFilterUI() {}

    function toggleFilterSelect(type, val) {
      saveFilterState();
      renderGoals();
    }

    function toggleFilter(group, val) {}

    function openMetaModal() {
      const modal = document.getElementById('metaModal');
      if (modal) {
        modal.classList.add('open');
        document.body.style.overflow = 'hidden';
      }
    }

    function closeMetaModal() {
      const modal = document.getElementById('metaModal');
      if (modal) {
        modal.classList.remove('open');
        document.body.style.overflow = '';
        document.getElementById('metaForm').reset();
      }
    }

    document.addEventListener('click', function(e) {
      if (e.target && e.target.id === 'metaModal') closeMetaModal();
    });

    function toggleFilter(group, val) {}

    function deleteMeta(idx) {
      const goals = getGoals();
      goals.splice(idx, 1);
      saveGoals(goals);
      renderGoals();
    }

    function updateMetaProgress(idx) {
      const div = document.getElementById('updateProgress_' + idx);
      div.style.display = div.style.display === 'none' ? 'block' : 'none';
    }

    function saveProgressUpdate(idx) {
      const input = document.getElementById('progressInput_' + idx);
      const val = parseInt(input.value) || 0;
      const goals = getGoals();
      goals[idx].current = val;
      saveGoals(goals);
      renderGoals();
    }

    function updateHandles() {
      // Static handle options, no filtering needed
    }

    function prefillAlcance() {
      const network = document.getElementById('metaNetwork').value;
      const handle = document.getElementById('metaHandle').value;
      const type = document.getElementById('metaGoalType').value;
      if (network && handle && (type === 'seguidores' || type === 'visualizacoes')) {
        const val = getMetricCurrent(normalizeNetwork(network), handle, type);
        if (val > 0) document.getElementById('metaCurrent').value = val;
      }
    }

    // ========== CHART.JS LOADER ==========
    function loadChartJS(callback) {
      if (typeof Chart !== 'undefined' && Chart) { callback(); return; }
      var s = document.createElement('script');
      s.src = 'https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js';
      s.onload = callback;
      s.onerror = function () { console.warn('Chart.js failed to load, charts disabled'); };
      document.head.appendChild(s);
    }

    function safeChart(ctx, config) {
      try {
        if (typeof Chart !== 'undefined' && Chart) return new Chart(ctx, config);
      } catch (e) { console.warn('Chart error:', e.message); }
      return null;
    }

    const doughnutCenterPlugin = {
      id: 'doughnutCenter',
      afterDraw(chart) {
        const meta = chart.getDatasetMeta(0);
        if (!meta || !meta.data || meta.data.length === 0) return;
        const { ctx: c, chartArea } = chart;
        const total = chart.data.datasets[0].data.reduce((a, b) => a + b, 0);
        const centerLabel = chart.config.options.plugins.doughnutCenter || {};
        const title = centerLabel.title || '';
        const cx = (chartArea.left + chartArea.right) / 2;
        const cy = (chartArea.top + chartArea.bottom) / 2;
        c.save();
        c.textAlign = 'center';
        c.textBaseline = 'middle';
        c.font = 'bold 22px Cairo, sans-serif';
        c.fillStyle = '#f4f6fc';
        c.fillText(total.toLocaleString('pt-BR'), cx, cy - 8);
        c.font = '12px Cairo, sans-serif';
        c.fillStyle = '#8b8fa3';
        c.fillText(title, cx, cy + 16);
        c.restore();
      }
    };

    // ========== INIT ==========
    document.addEventListener('DOMContentLoaded', () => {
      loadGoalsFromFirebase().then(() => {
        try {
          navigate('home');
        } catch (e) {
          document.getElementById('app').innerHTML =
            `<div class="page" style="text-align:center;padding:60px;">
          <div style="font-size:48px;color:#f44336;margin-bottom:16px;"><i class="fas fa-exclamation-triangle"></i></div>

          <p style="color:var(--text-muted);font-size:12px;margin-top:16px;">Tente limpar o cache do navegador e recarregar.</p>
        </div>`;
          console.error(e);
        }
      });
    });
